<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wynik analizy</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

<div class="form-box" style="margin-top: 100px;">
    <h2>Płatność zakończona ✔</h2>

    <button onclick="runPrediction()">Wygeneruj wyniki</button>


    <button onclick="downloadZip()" id="downloadBtn" style="display:none;">
        Pobierz ZIP
    </button>
    <div id="loader" style="display:none; margin-top:20px;">
    <div class="bar">
        <div class="progress" id="progress"></div>
    </div>
    <p id="loaderText">Przetwarzanie...</p>
</div>

</div>

<div id="tables"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let zipBlob = null;

async function runPrediction() {
    document.getElementById("loader").style.display = "block";
    document.getElementById("progress").style.width = "0%";
    document.getElementById("loaderText").innerText = "Analizujemy dane...";
    const session_id = new URLSearchParams(window.location.search)
        .get("session_id");

    const data = JSON.parse(localStorage.getItem("formData"));
    data.session_id = session_id;

    const maxRetries = 5;
    let response;


    let progress = 0;
    const progressBar = document.getElementById("progress");

    const interval = setInterval(() => {
        if (progress < 90) {
            progress += 15;
            progressBar.style.width = progress + "%";
        }
    }, 600);

    for (let i = 0; i < maxRetries; i++) {
        response = await fetch("https://krakowskieceny-plapp.onrender.com/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        if (response.ok) {
            clearInterval(interval);
            progressBar.style.width = "100%";
            document.getElementById("loaderText").innerText = "Zakończono ✔";

            setTimeout(() => {
                document.getElementById("loader").style.display = "none";
            }, 500);

            break; // sukces
        }

        await new Promise(r => setTimeout(r, 2000)); // czekaj 2s
    }

    if (!response.ok) {
        clearInterval(interval);
        document.getElementById("loaderText").innerText = "Nie udało się wygenerować wyników";
        document.getElementById("progress").style.background = "red";
        setTimeout(() => {
        document.getElementById("loader").style.display = "none";
            }, 1500);
        alert("Nie udało się wygenerować wyników. Spróbuj ponownie za około 20 sekund.");
        return;
    }

    const blob = await response.blob();
    zipBlob = blob;

    document.getElementById("downloadBtn").style.display = "inline-block";

    const zip = await JSZip.loadAsync(blob);
    const container = document.getElementById("tables");

    container.innerHTML = "";

    for (const filename of Object.keys(zip.files)) {
        const text = await zip.files[filename].async("text");
        const rows = text.trim().split("\n").map(r => r.split(","));

        const table = document.createElement("table");

        const caption = document.createElement("caption");
        caption.textContent = filename.replace(".csv", "");
        table.appendChild(caption);

        const thead = document.createElement("tr");

        rows[0].forEach(h => {
            const th = document.createElement("th");
            th.textContent = h;
            thead.appendChild(th);
        });

        table.appendChild(thead);

        const tbody = document.createElement("tbody");

        rows.slice(1).forEach(row => {
            const tr = document.createElement("tr");

            row.forEach(cell => {
                const td = document.createElement("td");
                td.textContent = cell;
                tr.appendChild(td);
            });

            tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        container.appendChild(table);
    }
}

function downloadZip() {
    if (!zipBlob) {
        alert("Najpierw wygeneruj dane!");
        return;
    }

    const url = window.URL.createObjectURL(zipBlob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "wyniki.zip";
    document.body.appendChild(a);
    a.click();
    a.remove();
}
</script>

</body>
</html>
